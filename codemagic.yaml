workflows:
  nextjs-web-build:
    name: Next.js Web App Build
    max_build_duration: 10
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create fallback app directory if missing
        script: |
          mkdir -p app
          if [ ! -f app/page.tsx ] && [ ! -f app/page.js ]; then
            echo 'export default function Page() { return <div>Building...</div> }' > app/page.tsx
          fi
      - name: Build Next.js site
        script: |
          npx next build --no-lint
