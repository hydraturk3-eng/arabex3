workflows:
  nextjs-web-build:
    name: Next.js Web App Build
    max_build_duration: 10
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Reorganize project structure
        script: |
          mkdir -p app_backup
          find . -maxdepth 1 ! -name '.' ! -name 'app_backup' ! -name 'package.json' ! -name 'package-lock.json' ! -name 'codemagic.yaml' ! -name 'next.config.ts' ! -name 'next.config.js' ! -name 'tsconfig.json' ! -name '.gitignore' ! -name '.git' -exec mv {} app_backup/ \;
          mkdir -p app
          mv app_backup/* app/ 2>/dev/null || true
          rm -rf app_backup
          if [ ! -f app/page.tsx ] && [ ! -f app/page.js ]; then
            echo 'export default function Page() { return <div>Arabex App</div> }' > app/page.tsx
          fi
      - name: Install dependencies
        script: |
          npm install dotenv @types/dotenv
          npm install
      - name: Build Next.js site
        script: |
          NEXT_DISABLE_ESLINT=1 npx next build --tsc-ignore-errors
